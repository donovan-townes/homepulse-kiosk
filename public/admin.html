<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomePulse Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout admin-layout">
      <header class="card">
        <p class="eyebrow">Admin</p>
        <h1>Household content manager</h1>
        <p class="lede">
          This first slice focuses on editing reminders, maintenance tasks, and
          household notes without touching code.
        </p>
      </header>

      <section class="grid admin-grid">
        <form class="card form" id="item-form">
          <h2>New item</h2>
          <label>
            Title
            <input name="title" maxlength="120" required />
          </label>
          <label>
            Category
            <select name="category">
              <option value="reminder">Reminder</option>
              <option value="maintenance">Maintenance</option>
              <option value="filter">Filter</option>
              <option value="note">Note</option>
              <option value="family">Family</option>
              <option value="status">Status</option>
            </select>
          </label>
          <label>
            Priority
            <select name="priority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </label>
          <label>
            Due date
            <input name="dueDate" type="datetime-local" />
          </label>
          <label>
            Notes
            <textarea name="notes" rows="4" maxlength="1000"></textarea>
          </label>
          <button class="button" type="submit">Create item</button>
          <p class="form-status" id="form-status"></p>
        </form>

        <section class="card">
          <div class="section-heading">
            <h2>Current items</h2>
            <a class="text-link" href="/">Back to display</a>
          </div>
          <ul class="list" id="admin-items-list"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
