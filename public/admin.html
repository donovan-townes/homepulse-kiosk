<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomePulse Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout admin-layout">
      <header class="card">
        <p class="eyebrow">Admin</p>
        <h1>Household content manager</h1>
        <p class="lede">
          This first slice focuses on editing reminders, maintenance tasks, and
          household notes without touching code.
        </p>
      </header>

      <section class="grid admin-grid">
        <form class="card form" id="item-form">
          <h2>New item</h2>
          <label>
            Title
            <input name="title" maxlength="120" required />
          </label>
          <label>
            Category
            <select name="category">
              <option value="chore">Chore</option>
              <option value="reminder">Reminder</option>
              <option value="maintenance">Maintenance</option>
              <option value="note">Note</option>
              <option value="family">Family</option>
              <option value="status">Status</option>
            </select>
          </label>
          <label>
            Priority
            <select name="priority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </label>
          <label>
            Due date
            <input name="dueDate" type="datetime-local" />
          </label>
          <label class="inline-check">
            <input id="is-recurring" name="isRecurring" type="checkbox" />
            Repeat this item
          </label>
          <fieldset class="recurrence-fields" id="recurrence-fields" hidden>
            <legend>Repeat settings</legend>
            <p class="list-meta recurrence-note">Repeats forever by default unless you manually remove it.</p>
            <label>
              Frequency
              <select name="recurrenceFrequency">
                <option value="weekly">Weekly</option>
                <option value="biweekly">Bi-weekly</option>
                <option value="monthly">Monthly</option>
                <option value="daily">Daily</option>
              </select>
            </label>
            <label>
              Interval
              <input name="recurrenceInterval" type="number" min="1" max="52" value="1" />
            </label>
            <label>
              Day of month (for monthly)
              <input name="dayOfMonth" type="number" min="1" max="31" placeholder="Uses due-date day by default" />
            </label>
            <label>
              Days of week (for weekly)
              <div class="weekday-grid">
                <label><input type="checkbox" name="daysOfWeek" value="0" /> Sun</label>
                <label><input type="checkbox" name="daysOfWeek" value="1" /> Mon</label>
                <label><input type="checkbox" name="daysOfWeek" value="2" /> Tue</label>
                <label><input type="checkbox" name="daysOfWeek" value="3" /> Wed</label>
                <label><input type="checkbox" name="daysOfWeek" value="4" /> Thu</label>
                <label><input type="checkbox" name="daysOfWeek" value="5" /> Fri</label>
                <label><input type="checkbox" name="daysOfWeek" value="6" /> Sat</label>
              </div>
            </label>
          </fieldset>
          <label>
            Notes
            <textarea name="notes" rows="4" maxlength="1000"></textarea>
          </label>
          <button class="button" type="submit">Create item</button>
          <p class="form-status" id="form-status"></p>
        </form>

        <section class="card">
          <div class="section-heading">
            <h2>Current items</h2>
            <div class="inline-actions">
              <button class="button secondary" id="delete-done-button" type="button">
                Delete done
              </button>
              <button class="button secondary" id="logout-button" type="button">
                Lock admin
              </button>
              <a class="text-link" href="/">Back to display</a>
            </div>
          </div>
          <ul class="list" id="admin-items-list"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
